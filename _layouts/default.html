<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% feed_meta %}
</head>
<body>
<div class="container">
    <header class="header">
        <h1><a href="{{ '/' | relative_url }}">📡 每日新闻<span>简报</span></a></h1>
        <p>AI 驱动 · 全网采集 · 每日更新</p>
    </header>

    {{ content }}

    <footer class="footer">
        📡 小新 · 数据来源：全网采集 · 入库去重（SHA256）<br>
        Powered by OpenClaw + Jekyll + GitHub Pages
    </footer>
</div>
</body>
</html>
