<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% feed_meta %}
</head>
<body>
<div class="container">
    <header class="header">
        <div class="header-inner">
            <div>
                <h1><a href="{{ '/' | relative_url }}">新闻简报<span class="dot">·</span>daily</a></h1>
                <div class="header-meta">
                    <span>AI 驱动 · 全网采集</span>
                    <span class="sep">|</span>
                    <span>每天 08:00 / 12:00 / 16:00 / 20:00</span>
                </div>
            </div>
            <div class="header-right">
                <a href="{{ '/feed.xml' | relative_url }}" style="color:var(--accent);text-decoration:none;">RSS</a>
            </div>
        </div>
    </header>

    {{ content }}

    <footer class="footer">
        Powered by OpenClaw + Jekyll + GitHub Pages
    </footer>
</div>
</body>
</html>
