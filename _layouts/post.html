---
layout: default
---

<div class="post-nav">
    <a href="{{ '/' | relative_url }}" class="back-link">← 首页</a>
    <span class="post-date-label">{{ page.date | date: "%Y年%m月%d日" }}</span>
</div>

<div id="masonry-grid" class="masonry"></div>

<div class="bottom-nav">
    {% if page.next %}
    <a href="{{ page.next.url | relative_url }}" class="nav-btn">← {{ page.next.date | date: "%m-%d" }}</a>
    {% endif %}
    {% if page.previous %}
    <a href="{{ page.previous.url | relative_url }}" class="nav-btn nav-btn-right">{{ page.previous.date | date: "%m-%d" }} →</a>
    {% endif %}
</div>

<!-- Hidden raw content for JS to parse -->
<div id="raw-content" style="display:none">{{ content }}</div>

<script>
(function() {
    const raw = document.getElementById('raw-content');
    const grid = document.getElementById('masonry-grid');

    // Parse sections from H2 headings
    const sections = [];
    let current = null;

    function walk(nodes) {
        for (const node of nodes) {
            if (node.nodeType === 1) { // Element
                if (node.tagName === 'H2') {
                    if (current) sections.push(current);
                    current = { title: node.textContent.trim(), items: [], comment: null };
                } else if (node.tagName === 'BLOCKQUOTE') {
                    if (current) {
                        const text = node.textContent.trim();
                        current.comment = text.replace(/^AI 锐评\s*/, '').replace(/^\*{0,2}AI 锐评\*{0,2}\s*/, '');
                    }
                } else if (node.tagName === 'UL') {
                    if (current) {
                        node.querySelectorAll(':scope > li').forEach(li => {
                            const html = li.innerHTML;
                            // Try to split title (bold) and summary
                            const strongMatch = html.match(/^<strong>(.*?)<\/strong>\s*(.*)/s);
                            if (strongMatch) {
                                current.items.push({ title: strongMatch[1], summary: strongMatch[2].replace(/^[-—]\s*/, '') });
                            } else {
                                current.items.push({ title: html.replace(/<[^>]+>/g, '').replace(/^[-—]\s*/, ''), summary: '' });
                            }
                        });
                    }
                } else if (node.tagName === 'H3' && current) {
                    // H3 becomes an item title
                    current.items.push({ title: node.textContent.trim(), summary: '', isSubtitle: true });
                } else if (node.tagName === 'P' && current) {
                    const text = node.textContent.trim();
                    if (text && !text.startsWith('📡') && !text.startsWith('采集')) {
                        // Add as summary to last item
                        if (current.items.length > 0 && !current.items[current.items.length - 1].isSubtitle) {
                            if (current.items[current.items.length - 1].summary) {
                                current.items[current.items.length - 1].summary += ' ' + text;
                            } else {
                                current.items[current.items.length - 1].summary = text;
                            }
                        }
                    }
                } else if (node.children.length > 0 && node.tagName !== 'HR') {
                    walk(node.childNodes);
                }
            }
        }
    }

    walk(raw.childNodes);
    if (current) sections.push(current);

    // Category icon map
    const icons = {
        '头条': '🔥', '科技': '🔬', '财经': '📊', '国际': '🌍',
        '政策': '📋', '社会': '🏙️', '时尚': '👗', '娱乐': '🎬',
        '体育': '⚽', '汽车': '🏎️', '房产': '🏠'
    };
    const tagClasses = {
        '头条': 'tag-国际', '科技': 'tag-科技', '财经': 'tag-财经', '国际': 'tag-国际',
        '政策': 'tag-政策', '社会': 'tag-社会', '时尚': 'tag-时尚', '娱乐': 'tag-娱乐',
        '体育': 'tag-体育', '汽车': 'tag-汽车', '房产': 'tag-房产'
    };

    function getIcon(title) {
        for (const [key, icon] of Object.entries(icons)) {
            if (title.includes(key)) return icon;
        }
        return '📌';
    }
    function getTagClass(title) {
        for (const [key, cls] of Object.entries(tagClasses)) {
            if (title.includes(key)) return cls;
        }
        return '';
    }
    function getCatName(title) {
        for (const key of Object.keys(icons)) {
            if (title.includes(key)) return key;
        }
        return '';
    }

    // Render sections as cards
    let html = '';
    sections.forEach((section, si) => {
        const icon = getIcon(section.title);
        const catName = getCatName(section.title);
        const tagCls = getTagClass(section.title);
        const isHeadline = section.title.includes('头条');

        // Section header card
        html += `<div class="card section-header-card ${isHeadline ? 'headline-section' : ''}">
            <div class="card-inner">
                <div class="section-label">
                    <span class="icon">${icon}</span>
                    <span>${section.title}</span>
                </div>
            </div>
        </div>`;

        // News item cards
        section.items.forEach((item, ii) => {
            const isMainHeadline = isHeadline && ii < 3;
            html += `<div class="card ${isMainHeadline ? 'headline' : ''}">
                <div class="card-inner">
                    ${catName ? `<span class="card-tag ${tagCls}">${catName}</span>` : ''}
                    <h4>${item.title}</h4>
                    ${item.summary ? `<div class="summary">${item.summary}</div>` : ''}
                </div>
            </div>`;
        });

        // AI comment card
        if (section.comment) {
            html += `<div class="ai-comment-card">
                <div class="label">🤖 AI 锐评</div>
                <p>${section.comment}</p>
            </div>`;
        }
    });

    grid.innerHTML = html;
})();
</script>
