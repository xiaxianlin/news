---
layout: default
---

<div class="post-nav">
    <a href="{{ '/' | relative_url }}" class="back-link">← 首页</a>
    <span class="post-date-label">{{ page.date | date: "%Y年%m月%d日" }}</span>
</div>

<div class="post-header">
    <h2>{{ page.title }}</h2>
</div>

<article class="post-content">
    {{ content }}
</article>

<div class="bottom-nav">
    {% if page.next %}
    <a href="{{ page.next.url | relative_url }}" class="nav-btn">← {{ page.next.date | date: "%m-%d" }}</a>
    {% endif %}
    {% if page.previous %}
    <a href="{{ page.previous.url | relative_url }}" class="nav-btn nav-btn-right">{{ page.previous.date | date: "%m-%d" }} →</a>
    {% endif %}
</div>
