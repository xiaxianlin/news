<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 每日新闻简报</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent2: #818cf8;
            --tag-red: #f87171;
            --tag-orange: #fb923c;
            --tag-green: #4ade80;
            --tag-blue: #60a5fa;
            --tag-purple: #c084fc;
            --tag-pink: #f472b6;
            --tag-teal: #2dd4bf;
            --tag-yellow: #facc15;
            --tag-cyan: #22d3ee;
            --tag-lime: #a3e635;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
        }
        .container { max-width: 860px; margin: 0 auto; padding: 20px 16px; }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 0 30px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 32px;
        }
        .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .header h1 span { color: var(--accent); }
        .header p { color: var(--text-muted); font-size: 14px; }

        /* Date Nav */
        .date-nav {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .date-nav label { font-size: 14px; color: var(--text-muted); white-space: nowrap; }
        .date-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .date-btn:hover { border-color: var(--accent); color: var(--accent); }
        .date-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }
        .stat-card .num { font-size: 24px; font-weight: 700; color: var(--accent); }
        .stat-card .label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        /* Section */
        .section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
        }
        .section-header:hover { background: rgba(255,255,255,0.02); }
        .section-icon { font-size: 20px; }
        .section-title { font-size: 16px; font-weight: 600; flex: 1; }
        .section-count {
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(255,255,255,0.06);
            padding: 2px 10px;
            border-radius: 10px;
        }
        .section-toggle { color: var(--text-muted); font-size: 12px; transition: transform 0.2s; }
        .section.collapsed .section-toggle { transform: rotate(-90deg); }
        .section.collapsed .section-body { display: none; }

        .section-body { padding: 16px 20px; }

        /* Headline (头条) */
        .headline {
            border-left: 3px solid var(--accent);
            padding-left: 16px;
            margin-bottom: 16px;
        }
        .headline h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        /* News item */
        .news-item {
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .news-item:last-child { border-bottom: none; }
        .news-item h4 {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .news-item h4 .hot {
            font-size: 10px;
            background: var(--tag-red);
            color: #fff;
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 600;
            white-space: nowrap;
            margin-top: 3px;
        }
        .news-item .summary {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 4px;
            padding-left: 0;
        }
        .news-item .meta {
            font-size: 11px;
            color: rgba(148,163,184,0.6);
        }
        .news-item .meta a {
            color: var(--accent);
            text-decoration: none;
        }
        .news-item .meta a:hover { text-decoration: underline; }

        /* AI Comment */
        .ai-comment {
            background: rgba(56,189,248,0.06);
            border: 1px solid rgba(56,189,248,0.15);
            border-radius: 8px;
            padding: 14px 16px;
            margin: 16px 0 4px;
            font-size: 13px;
            line-height: 1.8;
            color: var(--text-muted);
        }
        .ai-comment::before {
            content: '🤖 AI 锐评';
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 6px;
        }

        /* Tag colors */
        .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
        .tag-科技 { background: rgba(96,165,250,0.15); color: var(--tag-blue); }
        .tag-财经 { background: rgba(250,204,21,0.15); color: var(--tag-yellow); }
        .tag-国际 { background: rgba(248,113,113,0.15); color: var(--tag-red); }
        .tag-政策 { background: rgba(192,132,252,0.15); color: var(--tag-purple); }
        .tag-社会 { background: rgba(45,212,191,0.15); color: var(--tag-teal); }
        .tag-时尚 { background: rgba(244,114,182,0.15); color: var(--tag-pink); }
        .tag-娱乐 { background: rgba(251,146,60,0.15); color: var(--tag-orange); }
        .tag-体育 { background: rgba(74,222,128,0.15); color: var(--tag-green); }
        .tag-汽车 { background: rgba(34,211,238,0.15); color: var(--tag-cyan); }
        .tag-房产 { background: rgba(163,230,53,0.15); color: var(--tag-lime); }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 0;
            color: var(--text-muted);
            font-size: 12px;
            border-top: 1px solid var(--border);
            margin-top: 20px;
        }

        /* Loading / Empty */
        .loading, .empty {
            text-align: center;
            padding: 60px 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        @media (max-width: 640px) {
            .container { padding: 12px; }
            .header h1 { font-size: 22px; }
            .stats { grid-template-columns: repeat(3, 1fr); }
            .section-body { padding: 12px 14px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📡 每日新闻<span>简报</span></h1>
        <p>AI 驱动 · 全网采集 · 每日更新</p>
    </div>

    <div class="date-nav" id="dateNav">
        <label>📅 选择日期：</label>
    </div>

    <div id="stats" class="stats"></div>
    <div id="content"><div class="loading">加载中...</div></div>

    <div class="footer">
        📡 小新 · 数据来源：全网采集 · 入库去重（SHA256）<br>
        Powered by OpenClaw + GitHub Pages
    </div>
</div>

<script>
const CATEGORY_META = {
    '科技': { icon: '🔬', tagClass: 'tag-科技' },
    '财经': { icon: '📊', tagClass: 'tag-财经' },
    '国际': { icon: '🌍', tagClass: 'tag-国际' },
    '政策': { icon: '📋', tagClass: 'tag-政策' },
    '社会': { icon: '🏙️', tagClass: 'tag-社会' },
    '时尚': { icon: '👗', tagClass: 'tag-时尚' },
    '娱乐': { icon: '🎬', tagClass: 'tag-娱乐' },
    '体育': { icon: '⚽', tagClass: 'tag-体育' },
    '汽车': { icon: '🏎️', tagClass: 'tag-汽车' },
    '房产': { icon: '🏠', tagClass: 'tag-房产' },
};

async function loadIndex() {
    try {
        const res = await fetch('data/index.json');
        return await res.json();
    } catch {
        return [];
    }
}

async function loadDay(date) {
    try {
        const res = await fetch(`data/${date}.json`);
        return await res.json();
    } catch {
        return null;
    }
}

function renderDateNav(dates, active) {
    const nav = document.getElementById('dateNav');
    // keep label
    dates.forEach(d => {
        const btn = document.createElement('button');
        btn.className = 'date-btn' + (d === active ? ' active' : '');
        btn.textContent = d;
        btn.onclick = () => showDay(d);
        nav.appendChild(btn);
    });
}

function renderStats(data) {
    const el = document.getElementById('stats');
    const categories = {};
    let total = 0;
    data.forEach(item => {
        categories[item.category] = (categories[item.category] || 0) + 1;
        total++;
    });
    el.innerHTML = `
        <div class="stat-card"><div class="num">${total}</div><div class="label">总采集量</div></div>
        ${Object.entries(categories).map(([k,v]) => `
            <div class="stat-card"><div class="num">${v}</div><div class="label">${k}</div></div>
        `).join('')}
    `;
}

function renderContent(data) {
    const el = document.getElementById('content');
    if (!data || data.length === 0) {
        el.innerHTML = '<div class="empty">暂无数据</div>';
        return;
    }

    // group by category
    const grouped = {};
    data.forEach(item => {
        if (!grouped[item.category]) grouped[item.category] = [];
        grouped[item.category].push(item);
    });

    const order = ['科技','财经','国际','政策','社会','时尚','娱乐','体育','汽车','房产'];
    const sorted = order.filter(k => grouped[k]).map(k => [k, grouped[k]]);

    el.innerHTML = sorted.map(([cat, items]) => {
        const meta = CATEGORY_META[cat] || { icon: '📌', tagClass: '' };
        return `
        <div class="section">
            <div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
                <span class="section-icon">${meta.icon}</span>
                <span class="section-title">${cat}</span>
                <span class="section-count">${items.length} 条</span>
                <span class="section-toggle">▼</span>
            </div>
            <div class="section-body">
                ${items.map((item, i) => `
                    <div class="news-item">
                        <h4>
                            ${i === 0 ? '<span class="hot">头条</span>' : ''}
                            <span>${item.title}</span>
                        </h4>
                        <div class="summary">${item.summary || ''}</div>
                        <div class="meta">
                            <span class="tag ${meta.tagClass}">${item.source || ''}</span>
                            ${item.url ? ` · <a href="${item.url}" target="_blank" rel="noopener">原文链接</a>` : ''}
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>
        `;
    }).join('');
}

async function showDay(date) {
    // update nav
    document.querySelectorAll('.date-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent === date);
    });

    const data = await loadDay(date);
    if (data) {
        renderStats(data);
        renderContent(data);
    } else {
        document.getElementById('stats').innerHTML = '';
        document.getElementById('content').innerHTML = '<div class="empty">该日期暂无数据</div>';
    }
}

async function init() {
    const dates = await loadIndex();
    if (dates.length === 0) {
        document.getElementById('content').innerHTML = '<div class="empty">暂无数据</div>';
        return;
    }
    renderDateNav(dates, dates[0]);
    await showDay(dates[0]);
}

init();
</script>
</body>
</html>
